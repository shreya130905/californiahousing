<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
</head>

<body>

<h2>California House Price Prediction</h2>

<form action="/predict" method="post">

    <input type="text" name="MedInc" placeholder="MedInc"><br><br>

    <input type="text" name="HouseAge" placeholder="HouseAge"><br><br>

    <input type="text" name="AveRooms" placeholder="AveRooms"><br><br>

    <input type="text" name="AveBedrms" placeholder="AveBedrms"><br><br>

    <input type="text" name="Population" placeholder="Population"><br><br>

    <input type="text" name="AveOccup" placeholder="AveOccup"><br><br>

    <input type="text" name="Latitude" placeholder="Latitude"><br><br>

    <input type="text" name="Longitude" placeholder="Longitude"><br><br>

    <button type="submit">Predict</button>

</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
